<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Apna Surprise Banaiye ❤️</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- Floating Hearts -->
<div class="hearts">
    <span>❤</span>
    <span>💖</span>
    <span>💕</span>
    <span>💗</span>
    <span>💘</span>
    <span>❤</span>
</div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-transparent py-3">
    <div class="container">

        <a class="navbar-brand fw-bold fs-3" href="#">
            ❤️ Love Surprise
        </a>

        <button class="navbar-toggler"
                data-bs-toggle="collapse"
                data-bs-target="#menu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav ms-auto align-items-lg-center">

                <li class="nav-item me-3">

                    <button class="btn btn-outline-light rounded-pill music-btn">

                        <i class="bi bi-music-note-beamed"></i>

                    </button>

                </li>

                <li class="nav-item">

                    <button class="btn btn-light rounded-pill dark-btn">

                        🌙

                    </button>

                </li>

            </ul>

        </div>

    </div>
</nav>

<!-- Hero Section -->

<section class="hero">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-5 col-md-8">

<div class="glass-card">

<div class="text-center">

<div class="gift-icon">

🎁

</div>

<h2 class="mt-3">

Create Your

Secret Love Link

</h2>

<p>

Apna naam likhiye aur apne kisi khaas insaan ke liye ek pyara sa surprise link banaiye. ❤️

</p>

</div>

<form id="loveForm">

<div class="mb-3">

<label class="form-label">

Your Name

</label>

<input

type="text"

class="form-control form-control-lg"

placeholder="Enter your name"

id="senderName"

required>

</div>

<button

class="btn btn-danger w-100 btn-lg rounded-pill"

type="submit">

❤️ Create My Link

</button>

</form>

<div class="share-box mt-4">

<label>

Your Personal Link

</label>

<div class="input-group">

<input

type="text"

class="form-control"

id="generatedLink"

readonly>

<button

class="btn btn-success"

id="copyBtn">

<i class="bi bi-copy"></i>

</button>

</div>

<div class="d-grid gap-2 mt-3">

<button

class="btn btn-success btn-lg"

id="whatsappBtn">

<i class="bi bi-whatsapp"></i>

Share on WhatsApp

</button>

<button

class="btn btn-primary btn-lg"

id="telegramBtn">

<i class="bi bi-telegram"></i>

Share on Telegram

</button>

</div>

</div>

</div>

</div>

</div>

</div>

</section>

<footer class="text-center py-4">

Created with ❤️ By Raqib Khan

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/app.js"></script>

</body>

</html>

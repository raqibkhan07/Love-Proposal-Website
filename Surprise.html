<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Ek Pyara Sa Surprise ❤️</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background: linear-gradient(135deg, #ff4b91, #ff8fb7, #8f5cff);

        min-height: 100vh;

        display: flex;

        justify-content: center;

        align-items: center;

        overflow: hidden;

        color: white;
      }

      .card-box {
        width: 95%;
        max-width: 420px;

        background: rgba(255, 255, 255, 0.15);

        backdrop-filter: blur(20px);

        padding: 35px;

        border-radius: 30px;

        text-align: center;

        animation: popup 0.7s ease;

        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
      }

      .heart {
        font-size: 70px;

        animation: beat 1s infinite;
      }

      @keyframes beat {
        0% {
          transform: scale(1);
        }

        50% {
          transform: scale(1.2);
        }

        100% {
          transform: scale(1);
        }
      }

      #sender {
        font-size: 32px;

        font-weight: 700;

        color: #fff;

        margin: 20px 0;
      }

      .btn-open {
        margin-top: 25px;

        border-radius: 50px;

        padding: 15px;

        font-size: 18px;

        font-weight: 600;
      }

      .hearts {
        position: fixed;

        width: 100%;

        height: 100%;

        top: 0;

        left: 0;

        pointer-events: none;
      }

      .hearts span {
        position: absolute;

        bottom: -50px;

        font-size: 18px;

        opacity: 0.5;

        animation: float 12s linear infinite;
      }

      .hearts span:nth-child(1) {
        left: 10%;
      }
      .hearts span:nth-child(2) {
        left: 30%;
      }
      .hearts span:nth-child(3) {
        left: 50%;
      }
      .hearts span:nth-child(4) {
        left: 70%;
      }
      .hearts span:nth-child(5) {
        left: 90%;
      }

      @keyframes float {
        0% {
          transform: translateY(0);

          opacity: 0;
        }

        30% {
          opacity: 1;
        }

        100% {
          transform: translateY(-120vh);

          opacity: 0;
        }
      }
      .envelope {
        font-size: 90px;

        cursor: pointer;

        animation: shake 2s infinite;

        transition: 0.4s;
      }

      .envelope:hover {
        transform: scale(1.15);
      }

      @keyframes shake {
        0% {
          transform: rotate(0deg);
        }

        25% {
          transform: rotate(-10deg);
        }

        50% {
          transform: rotate(10deg);
        }

        75% {
          transform: rotate(-10deg);
        }

        100% {
          transform: rotate(0deg);
        }
      }

      @keyframes popup {
        0% {
          opacity: 0;

          transform: scale(0.8);
        }

        100% {
          opacity: 1;

          transform: scale(1);
        }
      }
    </style>
  </head>

  <body>
    <div class="hearts">
      <span>❤️</span>

      <span>💕</span>

      <span>💖</span>

      <span>💗</span>

      <span>💘</span>
    </div>

    <div id="envelopeArea">
      <div class="envelope">💌</div>

      <h3 class="mt-3">Tap To Open Your Surprise 💌</h3>
    </div>

    <div class="card-box d-none" id="cardBox">
      <div class="heart">❤️</div>

      <h4 class="mt-3 mb-2">💌 A Special Surprise From</h4>

      <div id="sender">Someone Special</div>

      <h3 class="mt-3">
        Someone has prepared something special just for you ❤️
      </h3>

      <p id="welcomeMessage">
        A beautiful surprise is waiting for you. Take one more step and discover
        a heartfelt message made especially for you. 💖
      </p>

      <button
        id="openBtn"
        class="btn btn-danger btn-open w-100"
        style="display: none"
        onclick="openProposal()"
      >
        💖 Continue
      </button>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);

      const sender = params.get("from");
      const receiver = params.get("to");
      const message = params.get("msg");

      document.getElementById("sender").innerHTML = sender
        ? decodeURIComponent(sender)
        : "Someone Special";

      function openProposal() {
        window.location.href =
          "proposal.html?from=" +
          encodeURIComponent(sender || "") +
          "&to=" +
          encodeURIComponent(receiver || "") +
          "&msg=" +
          encodeURIComponent(message || "");
      }

      const envelope = document.querySelector(".envelope");
      const cardBox = document.getElementById("cardBox");
      const openBtn = document.getElementById("openBtn");

      envelope.onclick = function () {
        document.getElementById("envelopeArea").style.display = "none";

        cardBox.classList.remove("d-none");

        openBtn.style.display = "block";
      };
    </script>
  </body>
</html>
